name: Build Windows release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build embedded Android template
        run: gradle -p template/android :app:assembleRelease --no-daemon

      - name: Install template
        shell: pwsh
        run: Copy-Item template/android/app/build/outputs/apk/release/app-release-unsigned.apk template/template.apk

      - uses: dtolnay/rust-toolchain@stable

      - name: Test Rust code
        run: cargo test

      - name: Build Windows executable
        run: cargo build --release

      - name: Generate dependency licenses
        shell: pwsh
        run: |
          cargo install cargo-about --locked --features cli
          cargo about generate about.hbs -o THIRD_PARTY_LICENSES.html

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item target/release/html2apk.exe release/Html2Apk.exe
          Copy-Item README.md,LICENSE,SPECIFICATION.md,THIRD_PARTY_NOTICES.md,THIRD_PARTY_LICENSES.html release/
          New-Item -ItemType Directory -Force release/licenses | Out-Null
          Copy-Item licenses/Apache-2.0.txt release/licenses/
          Compress-Archive -Path release/* -DestinationPath Html2Apk-Windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Html2Apk-Windows-x64
          path: Html2Apk-Windows-x64.zip
          if-no-files-found: error
