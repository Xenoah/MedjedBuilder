name: Build Windows release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build embedded Android templates
        run: gradle -p template/android :app:assembleRelease :app:bundleRelease --no-daemon

      - name: Install templates
        shell: pwsh
        run: |
          # リソース最適化タスクの無効化で出力APK名が変わることがあるため、名前に依存せずコピーする
          $apkDir = "template/android/app/build/outputs/apk/release"
          Get-ChildItem $apkDir | ForEach-Object { Write-Host "found: $($_.Name)" }
          $apk = Get-ChildItem "$apkDir/*.apk" | Select-Object -First 1
          if (-not $apk) { throw "release APK not found in $apkDir" }
          Copy-Item $apk.FullName template/template.apk
          Copy-Item template/android/app/build/outputs/bundle/release/app-release.aab template/template.aab
          # アイコン差し替えが機能する前提条件 (icon_payload.png のパスが短縮されていないこと) を検証
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [IO.Compression.ZipFile]::OpenRead((Resolve-Path template/template.apk))
          $icons = @($zip.Entries | Where-Object { $_.FullName -like "*icon_payload.png" })
          $zip.Dispose()
          Write-Host "icon entries in template.apk: $($icons.Count)"
          if ($icons.Count -lt 5) { throw "icon_payload.png entries missing in template.apk (resource path shortening still active?)" }

      - uses: dtolnay/rust-toolchain@stable

      - name: Test Rust code
        run: cargo test

      - name: Build Windows executable
        run: cargo build --release

      - name: Generate dependency licenses
        shell: pwsh
        run: |
          cargo install cargo-about --locked --features cli
          cargo about generate about.hbs -o THIRD_PARTY_LICENSES.html

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item target/release/medjedbuilder.exe release/MedjedBuilder.exe
          Copy-Item README.md,LICENSE,SPECIFICATION.md,THIRD_PARTY_NOTICES.md,THIRD_PARTY_LICENSES.html release/
          New-Item -ItemType Directory -Force release/licenses | Out-Null
          Copy-Item licenses/Apache-2.0.txt release/licenses/
          Copy-Item assets/fonts/OFL.txt release/licenses/OFL-LINESeedJP.txt
          Compress-Archive -Path release/* -DestinationPath MedjedBuilder-Windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: MedjedBuilder-Windows-x64
          path: MedjedBuilder-Windows-x64.zip
          if-no-files-found: error
